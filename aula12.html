<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aula Interativa: Plano Real</title>
    <!-- Configuração para App (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #f8fafc;
            touch-action: manipulation; /* Melhora resposta ao toque em mobile */
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #root { min-height: 100vh; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .image-transition {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .coin-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        /* Ajuste para evitar seleção de texto em TVs e touch */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        const callGemini = async (prompt, systemInstruction = "") => {
            if (!apiKey) return "Configure a sua API Key para usar a IA.";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                tools: [{ "google_search": {} }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.";
            } catch (error) {
                return "Erro na ligação com a IA.";
            }
        };

        const CURRENCY_DATA = {
            banknotes: [
                { id: 'r2', type: 'Cédula', value: '2', color: 'bg-blue-100', border: 'border-blue-400', animal: 'Tartaruga-marinha', emoji: '🐢', imageFront: 'imagens/2_front.jpg', imageBack: 'imagens/2_back.jpg', description: 'Cédula de 2 reais (Azul). O anverso apresenta a Efígie da República e o reverso a tartaruga-marinha.', features: ['Tamanho: 121mm x 65mm', 'Lançamento: 2001'] },
                { id: 'r5', type: 'Cédula', value: '5', color: 'bg-purple-100', border: 'border-purple-400', animal: 'Garça', emoji: '🦢', imageFront: 'imagens/5_front.jpg', imageBack: 'imagens/5_back.jpg', description: 'Cédula de 5 reais (Roxa). O anverso apresenta a Efígie da República e o reverso a garça.', features: ['Tamanho: 128mm x 65mm', 'Lançamento: 1994'] },
                { id: 'r10', type: 'Cédula', value: '10', color: 'bg-red-100', border: 'border-red-400', animal: 'Arara-vermelha', emoji: '🦜', imageFront: 'imagens/10_front.jpg', imageBack: 'imagens/10_back.jpg', description: 'Cédula de 10 reais (Vermelha). O anverso apresenta a Efígie da República e o reverso a arara-vermelha.', features: ['Tamanho: 135mm x 65mm', 'Lançamento: 1994'] },
                { id: 'r20', type: 'Cédula', value: '20', color: 'bg-yellow-100', border: 'border-yellow-400', animal: 'Mico-leão-dourado', emoji: '🐒', imageFront: 'imagens/20_front.jpg', imageBack: 'imagens/20_back.jpg', description: 'Cédula de 20 reais (Amarela). O anverso apresenta a Efígie da República e o reverso o mico-leão-dourado.', features: ['Tamanho: 142mm x 65mm', 'Lançamento: 2002'] },
                { id: 'r50', type: 'Cédula', value: '50', color: 'bg-orange-100', border: 'border-orange-400', animal: 'Onça-pintada', emoji: '🐆', imageFront: 'imagens/50_front.jpg', imageBack: 'imagens/50_back.jpg', description: 'Cédula de 50 reais (Castanha). O anverso apresenta a Efígie da República e o reverso a onça-pintada.', features: ['Tamanho: 149mm x 70mm', 'Lançamento: 1994'] },
                { id: 'r100', type: 'Cédula', value: '100', color: 'bg-cyan-100', border: 'border-cyan-400', animal: 'Garoupa', emoji: '🐟', imageFront: 'imagens/100_front.jpg', imageBack: 'imagens/100_back.jpg', description: 'Cédula de 100 reais (Azul claro). O anverso apresenta a Efígie da República e o reverso a garoupa.', features: ['Tamanho: 156mm x 70mm', 'Lançamento: 1994'] },
                { id: 'r200', type: 'Cédula', value: '200', color: 'bg-gray-200', border: 'border-gray-500', animal: 'Lobo-guará', emoji: '🐺', imageFront: 'imagens/200_front.jpg', imageBack: 'imagens/200_back.jpg', description: 'Cédula de 200 reais (Cinza). O anverso apresenta a Efígie da República e o reverso o lobo-guará.', features: ['Tamanho: 142mm x 65mm', 'Lançamento: 2020'] }
            ],
            coins: [
                { id: 'c05', type: 'Moeda', value: '0,05', color: 'bg-orange-50', border: 'border-orange-300', figure: 'Tiradentes', imageFront: 'imagens/005_front.jpg', imageBack: 'imagens/005_back.jpg', description: 'Moeda de 5 centavos. A 2ª Família (atual) é feita de aço revestido de cobre, enquanto a 1ª Família era de aço inox.', features: ['Material 2ª Família: Aço/Cobre', 'Diâmetro: 22mm', 'Peso: 4,10g'] },
                { id: 'c10', type: 'Moeda', value: '0,10', color: 'bg-yellow-50', border: 'border-yellow-300', figure: 'D. Pedro I', imageFront: 'imagens/010_front.jpg', imageBack: 'imagens/010_back.jpg', description: 'Moeda de 10 centavos. A 2ª Família possui revestimento de bronze, diferenciando-se da antiga versão em inox.', features: ['Material 2ª Família: Aço/Bronze', 'Diâmetro: 20mm', 'Peso: 4,80g'] },
                { id: 'c25', type: 'Moeda', value: '0,25', color: 'bg-yellow-100', border: 'border-yellow-400', figure: 'Deodoro da Fonseca', imageFront: 'imagens/025_front.jpg', imageBack: 'imagens/025_back.jpg', description: 'Moeda de 25 centavos. Na 2ª Família ganhou uma cor dourada (bronze), enquanto na 1ª era prateada.', features: ['Material 2ª Família: Aço/Bronze', 'Diâmetro: 25mm', 'Peso: 7,55g'] },
                { id: 'c50', type: 'Moeda', value: '0,50', color: 'bg-slate-100', border: 'border-slate-300', figure: 'Barão do Rio Branco', imageFront: 'imagens/050_front.jpg', imageBack: 'imagens/050_back.jpg', description: 'Moeda de 50 centavos. A 2ª Família é mais grossa e pesada que a moeda original de 1994.', features: ['Material 2ª Família: Aço Inoxidável', 'Diâmetro: 22,5mm', 'Peso: 7,80g'] },
                { id: 'c100', type: 'Moeda', value: '1,00', color: 'bg-slate-200', border: 'border-yellow-500', figure: 'Efígie da República', imageFront: 'imagens/1_moeda_front.jpg', imageBack: 'imagens/1_moeda_back.jpg', description: 'Moeda de 1 real. A versão atual (2ª Família) é bimetálica, muito diferente da primeira, que era apenas inox.', features: ['Material 2ª Família: Bimetálica', 'Diâmetro: 27mm', 'Peso: 7,00g'] }
            ]
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                History: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M12 7v5l4 2"/>
                    </svg>
                ),
                Banknote: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect width="20" height="12" x="2" x="6" rx="2"/>
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M6 12h.01M18 12h.01"/>
                    </svg>
                ),
                Coins: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="8" cy="8" r="6"/>
                        <path d="M18.09 10.37A6 6 0 1 1 10.34 18"/>
                        <path d="M7 6h2v4H7z"/>
                        <path d="M11 11h2v4h-2z"/>
                    </svg>
                ),
                Sparkles: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>
                        <path d="M5 3v4M3 5h4M21 17v4M19 19h4"/>
                    </svg>
                ),
                Home: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                ),
                X: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                ),
                ArrowLeft: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m12 19-7-7 7-7M19 12H5"/>
                    </svg>
                ),
                Repeat: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m17 2 4 4-4 4"/>
                        <path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
                        <path d="m7 22-4-4 4-4"/>
                        <path d="M21 13v1a4 4 0 0 1-4 4H3"/>
                    </svg>
                )
            };

            return icons[name] || <span>•</span>;
        };

        const SmartImage = ({ src, alt, emoji, className = "" }) => {
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(true);
            useEffect(() => { setLoading(true); setError(false); }, [src]);
            if (error) return (
                <div className={`flex flex-col items-center justify-center bg-slate-200 rounded-xl ${className}`}>
                    <span className="text-4xl">{emoji || '💰'}</span>
                    <span className="text-[10px] text-slate-400 mt-1 uppercase font-bold text-center p-1">Erro de imagem</span>
                </div>
            );
            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    {loading && <div className="absolute inset-0 bg-slate-100 animate-pulse flex items-center justify-center font-bold text-slate-300 uppercase text-xs">A carregar...</div>}
                    <img src={src} alt={alt} className={`${className} ${loading ? 'opacity-0' : 'opacity-100 transition-opacity duration-300'}`} onLoad={() => setLoading(false)} onError={() => { setError(true); setLoading(false); }} />
                </div>
            );
        };

        function App() {
            const [currentTab, setCurrentTab] = useState('home');
            const [selectedItem, setSelectedItem] = useState(null);
            const [showBack, setShowBack] = useState(false); 
            const [aiLoading, setAiLoading] = useState(false);
            const [aiResponse, setAiResponse] = useState(null);
            const [userQuestion, setUserQuestion] = useState("");
            const [chatHistory, setChatHistory] = useState([]);
            const scrollRef = useRef(null);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [chatHistory, aiLoading]);

            const handleCloseModal = () => { setSelectedItem(null); setShowBack(false); setAiResponse(null); };

            const handleAskAI = async (e) => {
                if (e) e.preventDefault();
                if (!userQuestion.trim()) return;
                const q = userQuestion;
                setUserQuestion("");
                setChatHistory(prev => [...prev, { role: 'user', text: q }]);
                setAiLoading(true);
                const res = await callGemini(q, "És um professor de economia didático que explica o Plano Real.");
                setChatHistory(prev => [...prev, { role: 'ai', text: res }]);
                setAiLoading(false);
            };

            const getCuriosity = async (item) => {
                setAiLoading(true);
                setAiResponse(null);
                const res = await callGemini(`Conta-me uma curiosidade técnica ou histórica fascinante sobre ${item.type === 'Cédula' ? 'a nota' : 'a moeda'} de ${item.value} reais.`);
                setAiResponse(res);
                setAiLoading(false);
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[85vh] text-center p-4 md:p-8 space-y-8 md:space-y-12 animate-fade-in">
                    <div className="space-y-4">
                        <h1 className="text-4xl md:text-8xl font-black text-green-900 uppercase tracking-tighter">O Plano Real</h1>
                        <p className="text-lg md:text-2xl text-slate-500 max-w-2xl mx-auto">Explora o nosso dinheiro no telemóvel, tablet ou TV.</p>
                    </div>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 w-full max-w-7xl">
                        <button onClick={() => setCurrentTab('history')} className="bg-white p-6 md:p-10 rounded-3xl md:rounded-[40px] shadow-xl border-b-8 border-yellow-500 flex flex-col items-center space-y-4 hover:translate-y-[-5px] active:scale-95 transition-all">
                            <div className="bg-yellow-100 p-4 md:p-8 rounded-full text-yellow-600"><Icon name="History" size={32} /></div>
                            <span className="text-lg md:text-2xl font-bold text-slate-800">História</span>
                        </button>
                        <button onClick={() => setCurrentTab('notes')} className="bg-white p-6 md:p-10 rounded-3xl md:rounded-[40px] shadow-xl border-b-8 border-green-500 flex flex-col items-center space-y-4 hover:translate-y-[-5px] active:scale-95 transition-all">
                            <div className="bg-green-100 p-4 md:p-8 rounded-full text-green-600"><Icon name="Banknote" size={32} /></div>
                            <span className="text-lg md:text-2xl font-bold text-slate-800">Cédulas</span>
                        </button>
                        <button onClick={() => setCurrentTab('coins')} className="bg-white p-6 md:p-10 rounded-3xl md:rounded-[40px] shadow-xl border-b-8 border-blue-500 flex flex-col items-center space-y-4 hover:translate-y-[-5px] active:scale-95 transition-all">
                            <div className="bg-blue-100 p-4 md:p-8 rounded-full text-blue-600"><Icon name="Coins" size={32} /></div>
                            <span className="text-lg md:text-2xl font-bold text-slate-800">Moedas</span>
                        </button>
                        <button onClick={() => setCurrentTab('ai_assistant')} className="bg-purple-600 text-white p-6 md:p-10 rounded-3xl md:rounded-[40px] shadow-xl border-b-8 border-purple-900 flex flex-col items-center space-y-4 hover:translate-y-[-5px] active:scale-95 transition-all">
                            <div className="bg-white/20 p-4 md:p-8 rounded-full text-white"><Icon name="Sparkles" size={32} /></div>
                            <span className="text-lg md:text-2xl font-bold text-white">Dúvidas IA</span>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="px-4 md:px-12 py-4 md:py-6 bg-white border-b-2 flex justify-between items-center shadow-sm sticky top-0 z-40">
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => {setCurrentTab('home'); handleCloseModal();}}>
                            <div className="bg-green-600 text-white px-3 py-1 rounded-lg font-black text-xl shadow-sm">R$</div>
                            <span className="text-xl md:text-3xl font-black text-slate-800 uppercase tracking-tighter">Aula Interativa</span>
                        </div>
                        {currentTab !== 'home' && (
                            <button onClick={() => {setCurrentTab('home'); handleCloseModal();}} className="bg-slate-800 text-white px-4 md:px-8 py-2 md:py-4 rounded-xl font-bold text-sm md:text-xl flex items-center space-x-2 active:scale-95 transition-all shadow-md">
                                <Icon name="Home" size={18} /> <span className="hidden sm:inline">Início</span>
                            </button>
                        )}
                    </header>

                    <main className="flex-1 overflow-hidden relative">
                        {currentTab === 'home' && renderHome()}
                        
                        {currentTab === 'history' && (
                            <div className="p-6 md:p-16 max-w-4xl mx-auto space-y-8 animate-fade-in h-full overflow-y-auto hide-scroll">
                                <h2 className="text-4xl md:text-6xl font-black text-slate-800 border-l-8 border-yellow-500 pl-4 md:pl-6">A Revolução</h2>
                                <div className="bg-white p-6 md:p-10 rounded-3xl md:rounded-[50px] shadow-2xl text-xl md:text-3xl leading-relaxed text-slate-700 space-y-6 border border-slate-100">
                                    <p>O <strong>Plano Real</strong> surgiu em 1994 como a solução para a hiperinflação.</p>
                                    <p>Antes das notas físicas, existiu a <strong>URV</strong>, uma moeda virtual que ajudou a transição.</p>
                                </div>
                            </div>
                        )}

                        {currentTab === 'notes' && (
                            <div className="p-4 md:p-12 grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-10 pb-32 animate-fade-in h-full overflow-y-auto hide-scroll">
                                {CURRENCY_DATA.banknotes.map(n => (
                                    <div key={n.id} onClick={() => {setSelectedItem(n); setShowBack(false);}} className={`bg-white p-4 md:p-8 rounded-3xl md:rounded-[50px] border-2 md:border-4 ${n.border} shadow-xl cursor-pointer hover:translate-y-[-10px] active:scale-95 transition-all flex flex-col items-center group`}>
                                        <div className="bg-slate-50 w-full h-32 md:h-48 rounded-2xl md:rounded-3xl flex items-center justify-center overflow-hidden mb-4 md:p-4">
                                            <SmartImage src={n.imageFront} emoji={n.emoji} className="h-full object-contain group-hover:scale-110 transition-transform duration-500" alt={n.animal} />
                                        </div>
                                        <div className="text-center font-black text-2xl md:text-4xl text-slate-800 tracking-tighter">R$ {n.value}</div>
                                        <div className="text-slate-400 font-bold uppercase text-[10px] md:text-sm mt-1 md:mt-2 tracking-widest">{n.animal}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {currentTab === 'coins' && (
                            <div className="p-4 md:p-12 grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-10 pb-32 animate-fade-in h-full overflow-y-auto hide-scroll">
                                {CURRENCY_DATA.coins.map(c => (
                                    <div key={c.id} onClick={() => {setSelectedItem(c); setShowBack(false);}} className={`bg-white p-4 md:p-10 rounded-3xl md:rounded-[50px] border-2 md:border-4 ${c.border} shadow-xl flex items-center space-x-2 md:space-x-8 cursor-pointer hover:translate-y-[-10px] active:scale-95 transition-all group flex flex-col items-center`}>
                                        <div className="bg-slate-50 w-full aspect-square rounded-full flex items-center justify-center overflow-hidden mb-4 p-4 md:p-8 coin-shadow">
                                            <SmartImage src={c.imageFront} emoji="🪙" className="w-full h-full object-contain group-hover:rotate-12 transition-transform duration-500" alt={c.value} />
                                        </div>
                                        <div className="text-center">
                                            <div className="font-black text-2xl md:text-5xl text-slate-800 tracking-tighter">R$ {c.value}</div>
                                            <div className="text-slate-400 font-bold text-[10px] md:text-lg mt-1 uppercase tracking-widest">{c.figure}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {currentTab === 'ai_assistant' && (
                            <div className="p-4 md:p-10 h-full flex flex-col max-w-5xl mx-auto animate-fade-in">
                                <div ref={scrollRef} className="flex-1 overflow-y-auto space-y-4 md:space-y-6 p-2 md:p-6 hide-scroll">
                                    {chatHistory.length === 0 && <div className="text-center text-slate-300 mt-10 md:mt-20 text-xl md:text-3xl font-bold opacity-30 italic">Faz-me uma pergunta sobre o Real!</div>}
                                    {chatHistory.map((h, i) => (
                                        <div key={i} className={`flex ${h.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-4 md:p-8 rounded-2xl md:rounded-[40px] text-lg md:text-2xl max-w-[85%] shadow-lg border border-slate-100 ${h.role === 'user' ? 'bg-slate-800 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none'}`}>{h.text}</div>
                                        </div>
                                    ))}
                                    {aiLoading && <div className="text-slate-400 italic text-sm md:text-xl px-4 flex items-center"><div className="w-3 h-3 md:w-4 md:h-4 bg-purple-400 rounded-full animate-ping mr-3"></div> A pensar...</div>}
                                </div>
                                <form onSubmit={handleAskAI} className="mt-4 p-4 md:p-6 bg-white rounded-2xl md:rounded-[40px] shadow-2xl flex space-x-2 md:space-x-4 border-2 border-slate-100">
                                    <input value={userQuestion} onChange={e => setUserQuestion(e.target.value)} className="flex-1 p-2 md:p-4 text-lg md:text-2xl outline-none" placeholder="Dúvida?" />
                                    <button className="bg-purple-600 text-white px-4 md:px-10 py-2 md:py-4 rounded-xl md:rounded-[25px] font-bold text-lg md:text-2xl active:scale-95 transition-all shadow-lg">OK</button>
                                </form>
                            </div>
                        )}
                    </main>

                    {selectedItem && (
                        <div className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-2 md:p-6 animate-fade-in overflow-hidden">
                            <div className="bg-white w-full max-w-7xl rounded-3xl md:rounded-[60px] overflow-hidden flex flex-col md:flex-row shadow-2xl h-[95vh] md:h-[92vh]">
                                {/* Lado Visual */}
                                <div className={`md:w-1/2 p-6 md:p-12 flex flex-col items-center justify-center relative ${selectedItem.color} transition-all duration-500 overflow-hidden`}>
                                    <div className="absolute top-6 md:top-12 left-6 md:left-12 text-6xl md:text-9xl font-black text-black/5 pointer-events-none tracking-tighter">R$ {selectedItem.value}</div>
                                    
                                    <div className="w-full flex flex-col items-center px-4 md:px-10 space-y-6 md:space-y-10">
                                        <div className={`relative w-full max-w-lg shadow-2xl overflow-hidden bg-white border-4 md:border-8 border-white group ${selectedItem.type === 'Moeda' ? 'rounded-full aspect-square' : 'rounded-2xl'}`}>
                                            <SmartImage 
                                                src={showBack ? selectedItem.imageBack : selectedItem.imageFront} 
                                                emoji={selectedItem.emoji || '🪙'} 
                                                className="w-full object-contain image-transition" 
                                                alt={selectedItem.value} 
                                            />
                                            <div className="absolute top-2 md:top-4 right-2 md:right-4 bg-black/60 text-white px-3 md:px-6 py-1 md:py-2 rounded-full text-[10px] md:text-sm font-black uppercase tracking-widest backdrop-blur-sm shadow-md">
                                                {selectedItem.type === 'Moeda' 
                                                    ? (showBack ? '1ª Família' : '2ª Família') 
                                                    : (showBack ? 'Reverso' : 'Anverso')}
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => setShowBack(!showBack)}
                                            className="bg-white px-6 md:px-10 py-3 md:py-6 rounded-2xl md:rounded-[30px] font-black text-lg md:text-2xl border-2 md:border-4 border-slate-200 flex items-center space-x-3 md:space-x-5 hover:bg-slate-50 transition-all shadow-lg active:scale-90 group"
                                        >
                                            <Icon name="Repeat" className={`text-green-600 transition-transform duration-700 ${showBack ? 'rotate-180' : ''}`} size={24} />
                                            <span className="text-slate-800">
                                                {selectedItem.type === 'Moeda' 
                                                    ? (showBack ? 'Ver 2ª Família' : 'Ver 1ª Família') 
                                                    : (showBack ? 'Ver Frente' : 'Ver Verso')}
                                            </span>
                                        </button>
                                    </div>

                                    <div className="mt-6 md:mt-10 w-full max-w-md px-4">
                                        {!aiResponse && !aiLoading && (
                                            <button onClick={() => getCuriosity(selectedItem)} className="w-full bg-white/70 backdrop-blur p-4 md:p-6 rounded-2xl md:rounded-[30px] font-black text-lg md:text-xl border-2 md:border-4 border-dashed border-slate-300 flex items-center justify-center space-x-4 hover:bg-white transition-all shadow-lg active:scale-95">
                                                <span className="text-purple-600 text-xl md:text-3xl">✨</span> <span>Facto Curioso IA</span>
                                            </button>
                                        )}
                                        {aiLoading && <div className="bg-white/60 p-4 md:p-6 rounded-2xl md:rounded-[30px] flex items-center justify-center space-x-4 text-slate-500 text-sm md:text-xl font-bold text-center">⏳ A pesquisar...</div>}
                                        {aiResponse && (
                                            <div className="bg-white p-4 md:p-8 rounded-2xl md:rounded-[35px] shadow-2xl text-base md:text-xl leading-relaxed border-l-8 md:border-l-[16px] border-purple-600 animate-fade-in max-h-32 md:max-h-48 overflow-y-auto hide-scroll">
                                                <p className="text-slate-700">{aiResponse}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Lado do Conteúdo */}
                                <div className="md:w-1/2 p-6 md:p-20 flex flex-col justify-between bg-white overflow-y-auto hide-scroll">
                                    <div className="space-y-6 md:space-y-12">
                                        <div className="flex justify-between items-start">
                                            <div className="space-y-1">
                                                <h2 className="text-4xl md:text-8xl font-black text-slate-800 tracking-tighter">{selectedItem.type}</h2>
                                                <p className="text-2xl md:text-5xl text-green-600 font-black uppercase tracking-tighter">R$ {selectedItem.value}</p>
                                            </div>
                                            <button onClick={handleCloseModal} className="p-3 md:p-6 bg-slate-100 rounded-full hover:bg-red-500 hover:text-white transition-all shadow-lg active:scale-90 text-2xl md:text-4xl font-bold">✕</button>
                                        </div>
                                        <p className="text-xl md:text-4xl leading-tight text-slate-700 font-medium tracking-tight">
                                            {selectedItem.description}
                                        </p>
                                        <div className="bg-slate-50 p-6 md:p-10 rounded-2xl md:rounded-[50px] border-2 border-slate-100 shadow-inner">
                                            <h3 className="font-black mb-4 md:mb-8 uppercase text-slate-300 tracking-[0.2em] md:tracking-[0.3em] text-xs md:text-lg text-center md:text-left">Ficha Técnica</h3>
                                            <div className="space-y-4 md:space-y-6">
                                                {selectedItem.features.map(f => (
                                                    <div key={f} className="text-lg md:text-3xl font-black text-slate-800 flex items-center">
                                                        <div className="w-3 h-3 md:w-5 md:h-5 bg-green-500 rounded-full mr-3 md:mr-6 shadow-sm flex-shrink-0"></div>
                                                        {f}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col space-y-4 mt-8 md:mt-16 pb-6">
                                        <button onClick={handleCloseModal} className="w-full py-6 md:py-10 bg-slate-900 text-white rounded-2xl md:rounded-[40px] font-black text-2xl md:text-4xl hover:bg-slate-800 active:scale-95 transition-all shadow-2xl flex items-center justify-center space-x-4 md:space-x-6">
                                            <Icon name="ArrowLeft" size={24} />
                                            <span>Retornar</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
